<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pre-Op Readiness Survey | Archangel Health</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .survey-shell { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }
    .survey-head { margin-bottom: 20px; }
    .survey-head h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; color: #0f172a; letter-spacing: -0.02em; }
    .survey-head p { margin: 0; color: #64748b; font-size: 14px; line-height: 1.5; }
    .q-block {
      border: 1px solid var(--gray-200, #e2e8f0);
      border-radius: 12px;
      background: #fff;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .q-block label.qtext { display: block; font-weight: 600; font-size: 15px; color: #0f172a; margin-bottom: 10px; }
    .q-opts { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .q-opts label.pick { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #334155; cursor: pointer; }
    .symptom-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 14px; color: #334155; }
    .survey-actions { margin-top: 22px; display: flex; gap: 12px; align-items: center; }
    .btn-primary {
      background: var(--primary, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .status-msg { font-size: 14px; color: #64748b; }
    .status-msg.err { color: #b91c1c; }
    .status-msg.ok { color: #166534; }
  </style>
</head>
<body>
  <div class="survey-shell" id="surveyRoot">
    <p class="status-msg">Loading survey…</p>
  </div>
  <script src="/static/preop-survey.js"></script>
</body>
</html>
