name: Tests

# Backend test suite (pytest). Runs on every PR and on push to main so the whole
# surface — including the Asclepius eval portal (packaging, validation, router,
# export) — is gated automatically rather than relying on a local run. The suite
# is hermetic: the LLM judge is mocked, no secrets or network are required, and
# the Asclepius portal is pointed at throwaway temp paths by tests/conftest.py.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a force-push doesn't pile up jobs.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        # RATE_LIMIT_ENABLED + the Asclepius DB/export temp paths are defaulted in
        # tests/conftest.py; nothing else is needed to boot the app under test.
        run: pytest -q --durations=10
