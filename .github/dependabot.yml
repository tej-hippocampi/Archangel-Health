version: 2
updates:
  # Python backend dependencies — weekly, grouped to reduce PR noise.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions used by our workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
